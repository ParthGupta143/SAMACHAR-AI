name: SAMACHAR.AI Auto Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Pipeline
        run: |
          curl -v -X POST https://samachar-api.onrender.com/api/admin/run-pipeline \
            -H "Content-Type: application/json" \
            --max-time 30
          echo "✅ Pipeline triggered"

      - name: Wait for pipeline to process
        run: sleep 180

      - name: Trigger Quiz
        run: |
          curl -X POST https://samachar-api.onrender.com/api/admin/generate-quiz \
            -H "Content-Type: application/json" \
            --max-time 30 || true
          echo "✅ Quiz triggered"